# Root path for the suites/playlists
# Relative paths are relative to the config file location
playlist-root = "~/skriini"

[plai]
socket = "/tmp/plai.sock"
run = false
path = "plai"
db = ":memory:"
log-level = "info"
fullscreen = false
image-duration = 1.0
blend-duration = 1.0

[plai.watermark]
path = ""
scaling = { w = 1.0, h = 1.0}

[playlist.stuff]
globs = ["+Mainokset/*.mp4", "+Photo-screen/*.JPG", "+Photo-screen/*.jpg", "+Photo-screen/*.JPEG", "+Photo-screen/*.jpeg"]

[playlist.prog_wed]
globs = "+Ohjelma/KE/*.mp4"

[playlist.prog_thu]
globs = "+Ohjelma/TO/*.mp4"

[playlist.prog_fri]
globs = "+Ohjelma/PE/*.mp4"

[playlist.prog_sat]
globs = "+Ohjelma/LA/*.mp4"

[playlist.wed]
from = ["prog_wed", "stuff"]

[playlist.thu]
from = ["prog_thu", "stuff"]

[playlist.fri]
from = ["prog_fri", "stuff"]

[playlist.sat]
from = ["prog_sat", "stuff"]
